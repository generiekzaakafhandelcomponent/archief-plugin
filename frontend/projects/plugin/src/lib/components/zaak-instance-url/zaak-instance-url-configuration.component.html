<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null
  } as obs"
>
  <v-paragraph [fullWidth]="true">
    {{ 'linkProcessToDocumentMessage' | pluginTranslate: pluginId | async }}
  </v-paragraph>
  <div class="spacer"></div>
  <v-input
    name="zaakInstanceUrl"
    [title]="'zaakInstanceUrl' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.zaakInstanceUrl"
    [required]="false"
    [tooltip]="'zaakInstanceUrlTooltip' | pluginTranslate: pluginId | async"
    placeholder="pv:resourceUrl"
  >
  </v-input>
  <v-input
    name="documentId"
    [title]="'documentId' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.documentId"
    [required]="false"
    [tooltip]="'documentIdTooltip' | pluginTranslate: pluginId | async"
    placeholder="pv:documentId"
  >
  </v-input>
</v-form>
