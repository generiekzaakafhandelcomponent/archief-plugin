<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfig$ ? (prefillConfig$ | async) : null,
  } as obs"
>
  <v-input
    name="configurationTitle"
    [title]="'configurationTitle' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.configurationTitle"
    [required]="true"
    [trim]="true"
    [tooltip]="'configurationTitleTooltip' | pluginTranslate: pluginId | async"
    placeholder="Archief Plugin"
  >
  </v-input>
  <ng-container
    *ngIf="{notificatiePluginSelectItems: notificatiePluginSelectItems$ | async} as vars"
  >
    <v-select
      [items]="vars.notificatiePluginSelectItems"
      [margin]="true"
      name="notificatiesApiPluginConfiguration"
      [title]="'notificatiesApiPluginConfiguration' | pluginTranslate: pluginId | async"
      [disabled]="obs.disabled"
      [defaultSelectionId]="obs.prefill?.notificatiesApiPluginConfiguration"
      [required]="true"
      [loading]="!vars.notificatiePluginSelectItems"
      [tooltip]="'notificatiesApiPluginConfigurationTooltip' | pluginTranslate: pluginId | async"
    ></v-select>
  </ng-container>
  <ng-container *ngIf="{processSelectItems: processSelectItems$ | async} as vars">
    <v-select
      [items]="vars.processSelectItems"
      [margin]="true"
      name="processToStart"
      [title]="'processToStart' | pluginTranslate: pluginId | async"
      [disabled]="obs.disabled"
      [defaultSelectionId]="obs.prefill?.processToStart"
      [required]="true"
      [loading]="!vars.processSelectItems"
      [tooltip]="'processToStartTooltip' | pluginTranslate: pluginId | async"
    ></v-select>
  </ng-container>
  <v-multi-input-form
    name="archiefProperties"
    [title]="'archiefProperties' | pluginTranslate: pluginId | async"
    [formTemplate]="archiefPropertyForm"
    [addRowText]="'addArchiefProperty' | pluginTranslate: pluginId | async"
    [required]="false"
    [tooltip]="'archiefPropertiesTooltip' | pluginTranslate: pluginId | async"
    (deleteRowEvent)="deleteRow($event)"
    [initialAmountOfRows]="0"
    [minimumAmountOfRows]="0"
    [defaultValues]="obs.prefill?.archiefProperties"
  >
  </v-multi-input-form>
</v-form>

<ng-template
  #archiefPropertyForm
  let-index="index"
  let-uuid="uuid"
  let-changeFunction="changeFunction"
  let-prefill="prefill"
>
  <ng-container
    *ngIf="{
      disabled: disabled$ | async,
    } as obs"
  >
    <v-form (valueChange)="changeFunction($event, uuid)">
      <v-input
        name="kanaal"
        [title]="'kanaal' | pluginTranslate: pluginId | async"
        [margin]="false"
        [disabled]="obs.disabled"
        [defaultValue]="prefill?.kanaal"
        [required]="true"
        [trim]="true"
        [tooltip]="'kanaalTooltip' | pluginTranslate: pluginId | async"
        [smallMargin]="true"
        placeholder=""
      >
      </v-input>
      <valtimo-carbon-multi-input
        type="keyValue"
        (valueChange)="filterValueChange($event, uuid)"
        [defaultValues]="prefill?.filters"
        [keyColumnTitle]="'filterKey' | pluginTranslate: pluginId | async"
        [valueColumnTitle]="'filterValue' | pluginTranslate: pluginId | async"
        [fullWidth]="true"
      ></valtimo-carbon-multi-input>
      <v-input class="hidden-input" name="uuid" [defaultValue]="uuid"> </v-input>
    </v-form>
  </ng-container>
</ng-template>
